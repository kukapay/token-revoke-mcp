# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - moralisApiKey
      - privateKey
    properties:
      moralisApiKey:
        type: string
        default: ""
        description: Moralis API key
      privateKey:
        type: string
        default: ""
        description: Ethereum private key for signing transactions
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['index.js'], env: { MORALIS_API_KEY: config.moralisApiKey, PRIVATE_KEY: config.privateKey } })
  exampleConfig:
    moralisApiKey: yourMoralisApiKey123
    privateKey: "0x0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
